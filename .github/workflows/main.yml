name: Build XinarAgent
on:
  push:
    branches: [ master, main ]
  workflow_dispatch:

jobs:
  build-windows:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4

      - name: Add msbuild to PATH
        uses: microsoft/setup-msbuild@v2

      - name: Build
        run: msbuild MeshAgent-2022.sln /p:Configuration=Release /p:Platform=x64 /p:WindowsTargetPlatformVersion=10.0

      - name: Upload
        uses: actions/upload-artifact@v4
        with:
          name: xinar-agent-windows
          path: '**/*.exe'

  build-linux:
    runs-on: ubuntu-22.04
    steps:
      - uses: actions/checkout@v4

      - name: Install deps
        run: |
          sudo apt-get update
          sudo apt-get install -y build-essential libssl-dev

      - name: Build
        run: make linux ARCHID=6 KVM=0

      - name: Upload
        uses: actions/upload-artifact@v4
        with:
          name: xinar-agent-linux
          path: meshagent
